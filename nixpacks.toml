[phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.pdo_mysql", "nodejs_20", "libatomic"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan view:cache && php artisan serve --host 0.0.0.0 --port $PORT"[phases.setup]
# Tambahkan pdo_sqlite agar database .sqlite bisa dibaca
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.pdo_sqlite", "nodejs_20", "libatomic"]

[phases.install]
# Tambahkan --no-dev untuk performa lebih cepat di server
cmds = ["composer install --optimize-autoloader --no-dev", "npm install"]

[phases.build]
# Build aset CSS/JS Tailwind agar muncul di website
cmds = ["npm run build"]

[start]
# Perintah start yang benar untuk Laravel di Production:
# 1. Pastikan file database ada
# 2. Jalankan migrasi otomatis
# 3. Optimasi Cache agar kencang
# 4. Hapus 'php artisan serve' (biarkan Railway yang handle web servernya)
cmd = "touch database/database.sqlite && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"