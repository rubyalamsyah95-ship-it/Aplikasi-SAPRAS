[phases.setup]
nixPkgs = [
    "php82", 
    "php82Extensions.gd", 
    "php82Extensions.pcntl", 
    "php82Extensions.curl", 
    "php82Extensions.zip", 
    "php82Extensions.bcmath",
    "php82Extensions.mbstring",
    "php82Extensions.pdo_mysql",
    "nodejs_20",
    "libatomic" # WAJIB ditambahkan untuk memperbaiki error build tadi
]

[phases.install]
cmds = [
    "composer install --ignore-platform-reqs --no-interaction", 
    "npm install"
]

[phases.build]
cmds = [
    "npm run build", 
    "php artisan storage:link",
    "php artisan optimize:clear" # Menghapus cache lama agar aset baru terbaca
]

[phases.start]
cmds = [
    "php artisan migrate --force", 
    "php artisan serve --host=0.0.0.0 --port=$PORT"
]