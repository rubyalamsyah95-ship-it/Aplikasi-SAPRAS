[phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.pdo_mysql", "nodejs_20", "libatomic"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan view:cache && php artisan serve --host 0.0.0.0 --port $PORT"