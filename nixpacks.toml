[phases.setup]
nixPkgs = ["php82", "php82Extensions.gd", "php82Extensions.pcntl", "php82Extensions.curl", "nodejs"]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"