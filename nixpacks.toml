[phases.setup]
nixPkgs = [
    "php82", 
    "php82Extensions.gd", 
    "php82Extensions.pcntl", 
    "php82Extensions.curl", 
    "php82Extensions.zip", 
    "php82Extensions.bcmath",
    "php82Extensions.mbstring",
    "php82Extensions.pdo_mysql",
    "nodejs"
]

[phases.install]
cmds = ["composer install --ignore-platform-reqs --no-interaction", "npm install"]

[phases.build]
cmds = ["npm run build", "php artisan storage:link"]

[phases.start]
# Baris di bawah ini akan memaksa database diisi ulang setiap kali aplikasi menyala
cmds = [
    "php artisan migrate:fresh --seed --force", 
    "php artisan serve --host=0.0.0.0 --port=$PORT"
]