[phases.setup]
nixPkgs = ["php84", "php84Extensions.gd", "php84Extensions.pdo_sqlite", "nodejs_20", "libatomic"]

[phases.install]
cmds = ["composer install --optimize-autoloader --no-dev"]

[phases.build]
cmds = ["php artisan optimize"]

[start]
cmd = "touch database/database.sqlite && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"